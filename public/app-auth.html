<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fly Darwin 로그인</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #0a0a0a; color: #fff; font-family: sans-serif; }
    .msg { text-align: center; }
  </style>
</head>
<body>
  <div class="msg" id="status">로그인 처리 중...</div>
  <script>
    (async function() {
      var SUPABASE_URL = 'https://yayfjpjuzpwhhxzwqyom.supabase.co';
      var SUPABASE_ANON_KEY = 'sb_publishable_p68ycUm3ZVTSw62a6wb_kA_8icbgCNF';
      var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Supabase가 URL 해시에서 토큰을 자동으로 처리
      var { data, error } = await sb.auth.getSession();
      if (data.session && data.session.access_token) {
        document.getElementById('status').textContent = '로그인 성공! 앱으로 돌아갑니다...';
        var deepLink = 'com.flydarwin.app://auth?access_token=' + data.session.access_token + '&refresh_token=' + data.session.refresh_token;
        setTimeout(function() {
          window.location.href = deepLink;
        }, 500);
      } else {
        // 세션이 없으면 잠시 대기 후 재확인
        sb.auth.onAuthStateChange(function(event, session) {
          if (session && session.access_token) {
            document.getElementById('status').textContent = '로그인 성공! 앱으로 돌아갑니다...';
            var deepLink = 'com.flydarwin.app://auth?access_token=' + session.access_token + '&refresh_token=' + session.refresh_token;
            setTimeout(function() {
              window.location.href = deepLink;
            }, 500);
          }
        });
        setTimeout(function() {
          if (!data.session) {
            document.getElementById('status').textContent = '로그인에 실패했습니다. 다시 시도해주세요.';
          }
        }, 10000);
      }
    })();
  </script>
</body>
</html>
